name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta, nightly]
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
    - name: Run tests
      run: cargo test --all-targets

  no_std:
    name: no_std + alloc build
    # Verifies the library is truly `no_std + alloc`-portable, in two
    # layers:
    #
    #   1. Host build with `--no-default-features`: catches accidental
    #      `std::*` references introduced into the library tree.
    #   2. Cross-compile to two real targets with no host-side `std`
    #      backend:
    #        - `thumbv7em-none-eabihf` — bare-metal ARM Cortex-M.
    #        - `wasm32-unknown-unknown` — WebAssembly without WASI.
    #      Either failing would surface a hidden `std`-dependency that
    #      the host check missed.
    #
    # Tests under `cargo test` still run with the `std` default
    # feature (covered by the `test` job above), since the standard
    # libtest harness itself requires `std`. Running the suite under
    # `wasm32-*` would require a `wasm-bindgen-test` rewrite of every
    # test — out of scope; the cross-compile check is the practical
    # "works in wasm" gate for a no-IO library.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust + no_std cross-compile targets
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
        targets: thumbv7em-none-eabihf, wasm32-unknown-unknown
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
    - name: Build lib (host, no default features → no_std + alloc)
      run: cargo build --lib --no-default-features
    - name: Clippy under no_std
      run: cargo clippy --lib --no-default-features -- -D warnings
    - name: Cross-compile lib for thumbv7em-none-eabihf (bare-metal ARM)
      run: cargo build --lib --no-default-features --target thumbv7em-none-eabihf
    - name: Cross-compile lib for wasm32-unknown-unknown (WebAssembly)
      run: cargo build --lib --no-default-features --target wasm32-unknown-unknown
    - name: Run full test suite under default features
      run: cargo test --all-targets

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rustfmt
    - name: Check formatting
      run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
    - name: Run clippy
      run: cargo clippy --all-targets -- -D warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
    - name: Check documentation
      run: cargo doc --no-deps --document-private-items
      env:
        RUSTDOCFLAGS: -D warnings

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview
    - name: Install tarpaulin
      uses: taiki-e/install-action@cargo-tarpaulin
    - name: Generate coverage
      run: cargo tarpaulin --engine=llvm --out xml --workspace --run-types AllTargets --run-types Doctests
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
